ui:
  title: "green service status"
  header: "green.doll.report"
  dashboard-subheading: "green status"
  logo: "https://misskey-taube.s3.eu-central-1.wasabisys.com/files/f0c6eee7-76a8-44fe-8d80-77fab4acd73b.png"
  favicon:
    default: "https://misskey-taube.s3.eu-central-1.wasabisys.com/files/f0c6eee7-76a8-44fe-8d80-77fab4acd73b.png"
    size16x16: "https://misskey-taube.s3.eu-central-1.wasabisys.com/files/f0c6eee7-76a8-44fe-8d80-77fab4acd73b.png"
    size32x32: "https://misskey-taube.s3.eu-central-1.wasabisys.com/files/f0c6eee7-76a8-44fe-8d80-77fab4acd73b.png"
  default-sort-by: group
  custom-css: |2
    body {
      font-family: monospace;
    }

storage:
  type: sqlite
  caching: true
  path: /status_history/history.db

alerting:
  telegram:
    token: ${GREEN_TELEGRAM_TOKEN}
    id: ${GREEN_TELEGRAM_CHAT}
    default-alert:
      description: "health check failed"
      send-on-resolved: true
      failure-threshold: 5
      success-threshold: 5

_variables:
  - &interval 60s
  - &http_condition
    - "[STATUS] == 200"
    - "[CERTIFICATE_EXPIRATION] > 48h"
    - "[RESPONSE_TIME] < 1000"

endpoints:
  #region "services"
  - name: snac
    url: https://snac.122.hu/
    interval: *interval
    conditions: *http_condition
    group: "services"

  - name: vanilla snac
    url: https://vanilla-snac.122.hu/
    interval: *interval
    conditions: *http_condition
    group: "services"

  - name: laptop snac
    url: https://snac.laptop.122.hu/
    interval: *interval
    conditions: *http_condition
    group: "services"

  - name: website
    url: https://122.hu/
    interval: *interval
    conditions: *http_condition
    alerts:
      - type: telegram
        description: "rhododendron https check"
    group: "services"

  - name: minecraft
    url: tcp://lotus.122.hu:25501
    interval: *interval
    conditions:
      - "[CONNECTED] == true"
    group: "services"
  #endregion "services"

  #region "infrastructure"
  - name: lotus
    url: https://lotus.122.hu/
    interval: *interval
    conditions: *http_condition
    alerts:
      - type: telegram
        description: "lotus https check"
    group: "infrastructure"

  - name: laptop
    url: https://laptop.122.hu/
    interval: *interval
    conditions: *http_condition
    group: "infrastructure"

  - name: rhododendron
    url: ssh://rhododendron.122.hu:2298
    interval: *interval
    conditions:
      - "[CONNECTED] == true"
    group: "infrastructure"
  #endregion "infrastructure"

  #region "cobble services"
  - name: cobblestonia
    url: tcp://cobble.cat:25565
    interval: *interval
    conditions:
      - "[CONNECTED] == true"
    group: "cobble services"

  - name: sillyposting.cobble.cat
    url: https://sillyposting.cobble.cat/
    interval: *interval
    conditions: *http_condition
    group: "cobble services"

  - name: felis.cobble.cat
    url: https://felis.cobble.cat/
    interval: *interval
    conditions: *http_condition
    group: "cobble services"

  - name: slsk.cobble.cat
    url: https://slsk.cobble.cat/
    interval: *interval
    conditions: *http_condition
    group: "cobble services"

  - name: fedi.cobble.cat
    url: https://fedi.cobble.cat/
    interval: *interval
    conditions: *http_condition
    group: "cobble services"

  - name: music.cobble.cat
    url: https://music.cobble.cat/
    interval: *interval
    conditions: *http_condition
    group: "cobble services"

  - name: snacking.cobble.cat
    url: https://snacking.cobble.cat/
    interval: *interval
    conditions: *http_condition
    group: "cobble services"

  - name: vita.cobble.cat
    url: https://vita.cobble.cat/
    interval: *interval
    conditions: *http_condition
    group: "cobble services"

  - name: cobble.cat
    url: https://cobble.cat/
    interval: *interval
    conditions: *http_condition
    group: "cobble services"
  #endregion "cobble services"

  #region "rhododendron proxies"
  - name: rhododendron cobble
    url: https://cobble.rhododendron.122.hu/
    interval: *interval
    conditions: *http_condition
    group: "rhododendron proxies"

  - name: rhododendron slsk
    url: https://slsk.rhododendron.122.hu/
    interval: *interval
    conditions: *http_condition
    group: "rhododendron proxies"

  - name: rhododendron music
    url: https://music.rhododendron.122.hu/
    interval: *interval
    conditions: *http_condition
    group: "rhododendron proxies"
  #endregion "rhododendron proxies"
