ui:  # web-ui configuration, feel free to change it !!
  title: "41666 status"  # <title/> tag
  header: "41666.doll.report"  # dashboard <h1>
  dashboard-subheading: "Service Status"  # dashboard <h2>
  default-sort-by: group
  custom-css: |2  # dashboard custom css
    body {
      font-family: monospace;
    }

storage:  # configure persistant history storage
  type: sqlite
  caching: true
  path: /status_history/history.db  # keep as is!!

endpoints:  # endpoints to probe. check gatus README.md for options
  - name: dis.sociat.ing
    url: https://dis.sociat.ing
    interval: 10s
    conditions:
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 48h"
    group: "services"  # Optional group

  - name: ircd
    url: tls://irc.dolly.sh:6697
    interval: 10s
    conditions:
      - "[CONNECTED] == true"
      - "[CERTIFICATE_EXPIRATION] > 48h"
    group: "services"

  - name: fileshare
    url: https://dripping.blood.pet/s/
    interval: 10s
    conditions:
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 48h"
    group: "services"

  - name: xnfm ios proxy
    url: https://xnfm.blood.pet/
    interval: 10s
    conditions:
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 48h"
    group: "services"

  - name: nix cache
    url: https://subby.blood.pet/
    interval: 10s
    conditions:
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 48h"
    group: "services"

  - name: ps2.live
    url: https://ps2.live/
    interval: 10s
    conditions:
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 48h"
    group: "services"

  - name: git.dolly.sh
    url: https://git.dolly.sh
    interval: 10s
    conditions:
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 48h"
    group: "services"

  - name: doll.repair
    url: https://doll.repair/
    interval: 10s
    conditions:
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 48h"
    group: "web"
  
  - name: noe.sh
    url: https://noe.sh/
    interval: 10s
    conditions:
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 48h"
    group: "web"

  - name: 3d.noe.sh
    url: https://3d.noe.sh/
    interval: 10s
    conditions:
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 48h"
    group: "web"

  - name: blood.pet
    url: https://blood.pet/
    interval: 10s
    conditions:
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 48h"
    group: "web"

  - name: hive router [ipv4]
    url: icmp://dead.dolly.sh
    interval: 10s
    conditions:
      - "[CONNECTED] == true"
    group: "infrastructure"
  
  - name: hive router [ipv6-att]
    url: icmp://[2600:1700:6850:b49f::dead:d011]
    interval: 10s
    conditions:
      - "[CONNECTED] == true"
    group: "infrastructure"
  
  - name: hive router [ipv6-prey]
    url: icmp://[2a14:6f44:a2c2::1]
    interval: 10s
    conditions:
      - "[CONNECTED] == true"
    group: "infrastructure"