alerting:
  discord:
    webhook-url: ${DISCORD_WEBHOOK_URL}
    title: ":ribbon: girlthing.doll.report"
    default-alert:
      description: "health check failed"
      send-on-resolved: true
      failure-threshold: 5
      success-threshold: 5

ui:  # web-ui configuration, feel free to change it !!
  title: "girlthi.ng status"  # <title/> tag
  header: "girlthing.doll.report"  # dashboard <h1>
  dashboard-subheading: "Service Status"  # dashboard <h2>
  logo: "https://girlthi.ng/~aperture/img/girlthing-heart.png"  # web ui main logo
  favicon:  # favico
    default: "https://girlthi.ng/~aperture/img/girlthing-heart.png"
    size16x16: "https://girlthi.ng/~aperture/img/girlthing-heart.png"
    size32x32: "https://girlthi.ng/~aperture/img/girlthing-heart.png"
  default-sort-by: group
  custom-css: |2  # dashboard custom css
    body {
      font-family: monospace;
    }

storage:  # configure persistant history storage
  type: sqlite
  caching: true
  path: /status_history/history.db  # keep as is!!

endpoints:  # endpoints to probe. check gatus README.md for options
  - name: sharkey
    url: https://sk.girlthi.ng
    interval: 10s
    conditions:
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 48h"
    group: "services"
    alerts:
      - type: discord

  - name: melon-ring-redirect
    url: https://melon-ring.pathetic.systems/thermia/next
    interval: 10s
    conditions:
      - "[STATUS] == 307"
      - "[CERTIFICATE_EXPIRATION] > 48h"
    client:
      ignore-redirect: true
    group: "services"
    alerts:
      - type: discord

  - name: melon-ring-index
    url: https://melon-ring.pathetic.systems/
    interval: 10s
