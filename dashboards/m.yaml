_variables:
  - &interval 60s
  - &endpoint_default
    interval: *interval
  - &condition_http
    - "[STATUS] == 200"
    - "[RESPONSE_TIME] < 300"
  - &condition_https
    - "[STATUS] == 200"
    - "[RESPONSE_TIME] < 300"
    - "[CERTIFICATE_EXPIRATION] > 48h"
  - &condition_ping
    - "[CONNECTED] == true"


ui:
  title: "m status"
  header: "m.doll.report"
  dashboard-subheading: "🦊"
  logo: "https://girlthi.ng/~aperture/img/girlthing-heart.png"
  favicon:
    default: "https://girlthi.ng/~aperture/img/girlthing-heart.png"
    size16x16: "https://girlthi.ng/~aperture/img/girlthing-heart.png"
    size32x32: "https://girlthi.ng/~aperture/img/girlthing-heart.png"
  default-sort-by: group
  custom-css: |2
    body {
      font-family: monospace;
    }

# keep as is!!
storage:
  type: sqlite
  caching: true
  path: /status_history/history.db

endpoints:
  - <<: *endpoint_default
    name: website
    url: https://theverygaming.furrypri.de
    conditions: *condition_https
    group: "services"

  - <<: *endpoint_default
    name: website (HTTP)
    url: http://http.theverygaming.furrypri.de
    conditions: *condition_http
    group: "services"

  - <<: *endpoint_default
    name: website (redirect)
    url: https://m.furrypri.de
    conditions: *condition_https
    group: "services"

  - <<: *endpoint_default
    name: theverygaming.furrypri.de authoritative DNS 1
    url: "ns1.theverygaming.furrypri.de"
    dns:
      query-name: "ns1.theverygaming.furrypri.de"
      query-type: "A"
    conditions:
      - "[DNS_RCODE] == NOERROR"
    group: "infrastructure"

  - <<: *endpoint_default
    name: vps-1
    url: icmp://vps-1.infra.theverygaming.furrypri.de
    conditions: *condition_ping
    group: "infrastructure"

  - <<: *endpoint_default
    name: vps-old
    url: icmp://vps-old.infra.theverygaming.furrypri.de
    conditions: *condition_ping
    group: "infrastructure"
