---
- name: ensure gatus config dir
  ansible.builtin.file:
    path: /opt/gatus_config
    state: directory

- name: ensure doll report config dir
  ansible.builtin.file:
    path: /opt/doll.report.nginx.conf.d
    state: directory


- name: debug loop
  debug:
    msg: "{{ dashboard }}"
  loop: "{{ dashboards | dict2items }}"
  loop_control:
    loop_var: dashboard

- name: instance config files
  ansible.builtin.template:
    src: gatus_config.yaml.j2
    dest: /opt/gatus_config/{{ dashboard.key }}.yaml
  loop: "{{ dashboards | dict2items }}"
  loop_control:
    loop_var: dashboard

- name: Create doll-report docker network
  community.docker.docker_network:
    name: doll-report

- name: ensure tenant dashboard gatus containers
  community.docker.docker_container:
    name: "gatus-{{ dashboard.key }}"
    image: ghcr.io/twin/gatus:stable
    state: started
    network_mode: "doll-report"
    restart_policy: "unless-stopped"
    recreate: false
    volumes:
      - "/opt/gatus_config/{{ dashboard.key }}.yaml:/config/config.yaml"
  loop: "{{ dashboards | dict2items }}"
  loop_control:
    loop_var: dashboard

- name: ensure nginx aggregator configuration
  ansible.builtin.template:
    src: nginx_server.conf.j2
    dest: /opt/doll.report.nginx.conf.d/{{ dashboard.key }}.conf
  loop: "{{ dashboards | dict2items }}"
  loop_control:
    loop_var: dashboard

- name: ensure nginx aggregator container
  community.docker.docker_container:
    name: "nginx-doll-report"
    image: nginx:latest
    state: started
    restart_policy: "unless-stopped"
    restart: true
    recreate: false
    network_mode: "doll-report"
    volumes:
      - "/opt/doll.report.nginx.conf:/etc/nginx/nginx.conf"
      - "/opt/doll.report.nginx.conf.d:/etc/nginx/conf.d"
    ports:
      - "127.0.0.1:8081:80"
